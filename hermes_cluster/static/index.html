<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hermes Agent Cluster Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3;
  --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
  --orange: #d29922; --purple: #bc8cff; --cyan: #39d353;
  --sidebar-w: 260px;
}
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }

.layout { display: flex; height: 100vh; }
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: transform .2s; z-index: 10; }
.sidebar.collapsed { transform: translateX(-100%); position: absolute; height: 100%; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 16px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.sidebar-header h2 .icon { font-size: 20px; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-group { margin-bottom: 4px; }
.nav-group-header { display: flex; align-items: center; padding: 8px 16px; cursor: pointer; color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; user-select: none; }
.nav-group-header:hover { color: var(--text); background: rgba(88,166,255,0.05); }
.nav-group-header .arrow { margin-right: 8px; font-size: 10px; transition: transform .2s; }
.nav-group-header .arrow.open { transform: rotate(90deg); }
.nav-item { display: flex; align-items: center; padding: 6px 16px 6px 32px; cursor: pointer; color: var(--text-dim); font-size: 13px; border-left: 2px solid transparent; }
.nav-item:hover { color: var(--text); background: rgba(88,166,255,0.05); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,0.08); }
.nav-item .method-badge { font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; margin-right: 8px; min-width: 36px; text-align: center; }
.nav-item .method-badge.GET { background: #1a3a2a; color: var(--green); }
.nav-item .method-badge.POST { background: #1a2a3a; color: var(--accent); }
.nav-item .method-badge.PUT { background: #3a2a1a; color: var(--orange); }
.nav-item .method-badge.PATCH { background: #2a1a3a; color: var(--purple); }
.nav-item .method-badge.DELETE { background: #3a1a1a; color: var(--red); }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--card); }
.hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 16px; }
.topbar-input-group { display: flex; align-items: center; gap: 8px; flex: 1; }
.topbar-input-group label { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
.topbar-input-group input { flex: 1; max-width: 400px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 13px; }
.topbar-input-group input:focus { outline: none; border-color: var(--accent); }
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: #238636; border-color: #238636; color: #fff; }
.btn.primary:hover { background: #2ea043; }
.btn.danger { background: #3a1a1a; border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: #4a1a1a; }
.btn.small { padding: 4px 10px; font-size: 12px; }
.content { flex: 1; overflow-y: auto; padding: 20px; }
.content-area { max-width: 1200px; margin: 0 auto; }

/* Overview */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.stat-card .label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-card .value.green { color: var(--green); }
.stat-card .value.orange { color: var(--orange); }
.stat-card .value.red { color: var(--red); }
.health-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 12px; overflow: hidden; }
.health-bar .fill { height: 100%; border-radius: 2px; transition: width .5s; }
.health-bar .fill.green { background: var(--green); }
.health-bar .fill.orange { background: var(--orange); }
.health-bar .fill.red { background: var(--red); }
.overview-details { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.detail-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.detail-card h3 { font-size: 14px; color: var(--accent); margin-bottom: 12px; }
.detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.detail-row:last-child { border-bottom: none; }
.detail-row .k { color: var(--text-dim); }
.detail-row .v { color: var(--text); font-family: monospace; }

/* Endpoint cards */
.endpoint-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.endpoint-header { display: flex; align-items: center; padding: 12px 16px; gap: 10px; cursor: pointer; user-select: none; }
.endpoint-header:hover { background: rgba(88,166,255,0.03); }
.endpoint-header .method-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; min-width: 50px; text-align: center; }
.endpoint-header .method-badge.GET { background: #1a3a2a; color: var(--green); }
.endpoint-header .method-badge.POST { background: #1a2a3a; color: var(--accent); }
.endpoint-header .method-badge.PUT { background: #3a2a1a; color: var(--orange); }
.endpoint-header .method-badge.PATCH { background: #2a1a3a; color: var(--purple); }
.endpoint-header .method-badge.DELETE { background: #3a1a1a; color: var(--red); }
.endpoint-header .url { font-family: monospace; font-size: 13px; color: var(--text); }
.endpoint-header .desc { color: var(--text-dim); font-size: 12px; margin-left: auto; }
.endpoint-header .toggle { color: var(--text-dim); margin-left: 8px; transition: transform .2s; font-size: 12px; }
.endpoint-header .toggle.open { transform: rotate(180deg); }
.endpoint-body { padding: 16px; border-top: 1px solid var(--border); }
.form-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 200px; }
.form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; }
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
.form-group textarea { min-height: 80px; resize: vertical; font-family: monospace; }
.actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
.response-panel { margin-top: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.response-header { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: rgba(88,166,255,0.05); border-bottom: 1px solid var(--border); font-size: 12px; }
.response-header .status { font-weight: 700; font-family: monospace; }
.response-header .status.s2 { color: var(--green); }
.response-header .status.s3 { color: var(--accent); }
.response-header .status.s4 { color: var(--orange); }
.response-header .status.s5 { color: var(--red); }
.response-header .time { color: var(--text-dim); }
.response-body { padding: 12px; max-height: 400px; overflow: auto; }
.response-body pre { margin: 0; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
.json-key { color: var(--accent); }
.json-string { color: var(--green); }
.json-number { color: var(--orange); }
.json-bool { color: var(--purple); }
.json-null { color: var(--red); }
.loading { color: var(--text-dim); font-style: italic; }
.page-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.page-subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
.section-title { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(88,166,255,0.15); color: var(--accent); }
.overlay { display: none; }
@media (max-width: 768px) {
  .hamburger { display: block; }
  .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .overlay.open { display: block; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9; }
  .overview-details { grid-template-columns: 1fr; }
  .topbar-input-group input { max-width: 200px; }
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.online { background: var(--green); }
.status-dot.offline { background: var(--red); }
.status-dot.unknown { background: var(--orange); }
.tag { display: inline-block; padding: 2px 6px; background: rgba(88,166,255,0.1); border-radius: 4px; font-size: 11px; color: var(--accent); margin: 2px; }

/* Setup Wizard */
.wizard-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.wizard-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 32px; }
.wizard-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.wizard-subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
.wizard-steps { display: flex; gap: 8px; margin-bottom: 24px; }
.wizard-step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.wizard-step-dot.active { background: var(--accent); }
.wizard-step-dot.done { background: var(--green); }
.wizard-role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.wizard-role-card { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all .15s; }
.wizard-role-card:hover { border-color: var(--text-dim); }
.wizard-role-card.selected { border-color: var(--accent); }
.wizard-role-card .role-icon { font-size: 36px; margin-bottom: 12px; }
.wizard-role-card .role-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.wizard-role-card .role-desc { font-size: 12px; color: var(--text-dim); }
.wizard-form { display: flex; flex-direction: column; gap: 16px; }
.wizard-form .form-group label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; display: block; }
.wizard-form .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
.wizard-form .form-group input:focus { outline: none; border-color: var(--accent); }
.wizard-cap-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.wizard-cap-item { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s; }
.wizard-cap-item:hover { border-color: var(--accent); }
.wizard-cap-item.selected { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }
.wizard-cap-item input[type="checkbox"] { margin: 0; cursor: pointer; }
.wizard-summary { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.wizard-summary .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.wizard-summary .summary-row:last-child { border-bottom: none; }
.wizard-summary .summary-key { color: var(--text-dim); }
.wizard-summary .summary-val { color: var(--text); font-family: monospace; }
.wizard-token-row { display: flex; align-items: center; gap: 8px; }
.wizard-token-row .token-value { font-family: monospace; font-size: 12px; color: var(--green); user-select: all; }
.wizard-token-row .copy-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.wizard-token-row .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.wizard-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ===== API Endpoints Definition =====
const ENDPOINTS = [
  // GROUP 1 - Health & Info
  { group: 'Health & Info', items: [
    { id: 'health', method: 'GET', path: '/health', desc: 'Cluster health check', inputs: [] },
    { id: 'metrics', method: 'GET', path: '/metrics', desc: 'Prometheus metrics', inputs: [] },
    { id: 'docs', method: 'GET', path: '/docs', desc: 'Swagger UI', inputs: [] },
    { id: 'openapi', method: 'GET', path: '/openapi.json', desc: 'OpenAPI schema', inputs: [] },
  ]},
  // GROUP 2 - Nodes
  { group: 'Nodes', items: [
    { id: 'nodes_join', method: 'POST', path: '/api/v1/nodes/join', desc: 'Join node to cluster',
      inputs: [{ name: 'node_name', label: 'Node Name', type: 'text', required: true }, { name: 'capabilities', label: 'Capabilities (JSON array)', type: 'textarea', placeholder: '["compute","storage"]' }] },
    { id: 'nodes_heartbeat', method: 'POST', path: '/api/v1/nodes/heartbeat', desc: 'Send node heartbeat',
      inputs: [{ name: 'node_id', label: 'Node ID', type: 'text', required: true }] },
    { id: 'nodes_list', method: 'GET', path: '/api/v1/nodes', desc: 'List all nodes', inputs: [] },
    { id: 'nodes_capabilities', method: 'PATCH', path: '/api/v1/nodes/{node_id}/capabilities', desc: 'Update node capabilities',
      inputs: [{ name: 'node_id', label: 'Node ID (in URL)', type: 'text', required: true, urlParam: true },
               { name: 'capabilities', label: 'Capabilities (JSON array)', type: 'textarea', required: true, placeholder: '["compute","storage"]' }] },
  ]},
  // GROUP 3 - Tasks
  { group: 'Tasks', items: [
    { id: 'tasks_create', method: 'POST', path: '/api/v1/tasks', desc: 'Create task',
      inputs: [{ name: 'title', label: 'Title', type: 'text', required: true },
               { name: 'priority', label: 'Priority', type: 'text', placeholder: '0-100' },
               { name: 'requires', label: 'Requires (JSON array)', type: 'textarea', placeholder: '["task_id_1"]' }] },
    { id: 'tasks_list', method: 'GET', path: '/api/v1/tasks', desc: 'List all tasks', inputs: [] },
    { id: 'tasks_complete', method: 'POST', path: '/api/v1/tasks/{task_id}/complete', desc: 'Complete task',
      inputs: [{ name: 'task_id', label: 'Task ID (in URL)', type: 'text', required: true, urlParam: true }] },
    { id: 'tasks_fail', method: 'POST', path: '/api/v1/tasks/{task_id}/fail', desc: 'Fail task',
      inputs: [{ name: 'task_id', label: 'Task ID (in URL)', type: 'text', required: true, urlParam: true },
               { name: 'reason', label: 'Reason', type: 'text', required: true }] },
    { id: 'tasks_unblock', method: 'POST', path: '/api/v1/tasks/{task_id}/unblock', desc: 'Unblock task',
      inputs: [{ name: 'task_id', label: 'Task ID (in URL)', type: 'text', required: true, urlParam: true }] },
    { id: 'tasks_advance', method: 'POST', path: '/api/v1/tasks/{task_id}/advance', desc: 'Advance task state',
      inputs: [{ name: 'task_id', label: 'Task ID (in URL)', type: 'text', required: true, urlParam: true }] },
    { id: 'tasks_deps', method: 'POST', path: '/api/v1/tasks/{task_id}/dependencies', desc: 'Add dependencies',
      inputs: [{ name: 'task_id', label: 'Task ID (in URL)', type: 'text', required: true, urlParam: true },
               { name: 'depends_on', label: 'Depends On (JSON array)', type: 'textarea', required: true, placeholder: '["task_id_1","task_id_2"]' }] },
    { id: 'tasks_dependents', method: 'GET', path: '/api/v1/tasks/{task_id}/dependents', desc: 'Get task dependents',
      inputs: [{ name: 'task_id', label: 'Task ID (in URL)', type: 'text', required: true, urlParam: true }] },
    { id: 'tasks_chain', method: 'GET', path: '/api/v1/tasks/{task_id}/trigger-chain', desc: 'Get trigger chain',
      inputs: [{ name: 'task_id', label: 'Task ID (in URL)', type: 'text', required: true, urlParam: true }] },
  ]},
  // GROUP 4 - Leases
  { group: 'Leases', items: [
    { id: 'leases_create', method: 'POST', path: '/api/v1/leases', desc: 'Create lease',
      inputs: [{ name: 'task_id', label: 'Task ID', type: 'text', required: true },
               { name: 'node_id', label: 'Node ID', type: 'text', required: true },
               { name: 'ttl_seconds', label: 'TTL (seconds)', type: 'text', placeholder: '3600' }] },
    { id: 'leases_revoke', method: 'DELETE', path: '/api/v1/leases/{lease_id}', desc: 'Revoke lease',
      inputs: [{ name: 'lease_id', label: 'Lease ID (in URL)', type: 'text', required: true, urlParam: true }] },
    { id: 'leases_list', method: 'GET', path: '/api/v1/leases', desc: 'List all leases', inputs: [] },
  ]},
  // GROUP 5 - Sync
  { group: 'Sync', items: [
    { id: 'sync_receive', method: 'POST', path: '/api/v1/sync/receive', desc: 'Receive sync message',
      inputs: [{ name: 'version', label: 'Version', type: 'text', required: true },
               { name: 'sender_node', label: 'Sender Node', type: 'text', required: true },
               { name: 'event_type', label: 'Event Type', type: 'text', required: true },
               { name: 'timestamp', label: 'Timestamp', type: 'text', placeholder: 'ISO 8601' }] },
    { id: 'sync_batch', method: 'POST', path: '/api/v1/sync/receive-batch', desc: 'Receive batch sync',
      inputs: [{ name: 'messages', label: 'Messages (JSON array)', type: 'textarea', required: true, placeholder: '[{...}]' }] },
    { id: 'sync_status', method: 'GET', path: '/api/v1/sync/status', desc: 'Get sync status', inputs: [] },
  ]},
  // GROUP 6 - Recovery
  { group: 'Recovery', items: [
    { id: 'recovery_trigger', method: 'POST', path: '/api/v1/recovery/trigger', desc: 'Trigger recovery',
      inputs: [{ name: 'node_id', label: 'Node ID', type: 'text', required: true }] },
    { id: 'recovery_log', method: 'GET', path: '/api/v1/recovery/log', desc: 'Get recovery log', inputs: [] },
    { id: 'recovery_stats', method: 'GET', path: '/api/v1/recovery/stats', desc: 'Get recovery stats', inputs: [] },
  ]},
  // GROUP 7 - Schedule
  { group: 'Schedule', items: [
    { id: 'schedule_trigger', method: 'POST', path: '/api/v1/schedule/trigger', desc: 'Trigger scheduling', inputs: [] },
    { id: 'schedule_stats', method: 'GET', path: '/api/v1/schedule/stats', desc: 'Schedule stats', inputs: [] },
    { id: 'schedule_decisions', method: 'GET', path: '/api/v1/schedule/decisions', desc: 'Get decisions', inputs: [] },
  ]},
  // GROUP 8 - Workflow
  { group: 'Workflow', items: [
    { id: 'workflow_graph', method: 'GET', path: '/api/v1/workflow/graph', desc: 'Get workflow graph', inputs: [] },
  ]},
  // GROUP 9 - Status & Summary
  { group: 'Status & Summary', items: [
    { id: 'status_list', method: 'GET', path: '/api/v1/status', desc: 'Get status entries',
      inputs: [{ name: 'node', label: 'Node (query param)', type: 'text', optional: true, queryParam: true },
               { name: 'status', label: 'Status (query param)', type: 'text', optional: true, queryParam: true }] },
    { id: 'summary', method: 'GET', path: '/api/v1/summary', desc: 'Get cluster summary', inputs: [] },
  ]},
  // GROUP 10 - Config
  { group: 'Config', items: [
    { id: 'config_get', method: 'GET', path: '/api/v1/config', desc: 'Get config', inputs: [] },
    { id: 'config_put', method: 'PUT', path: '/api/v1/config', desc: 'Update config',
      inputs: [{ name: 'config', label: 'Full Config (JSON)', type: 'textarea', required: true,
                 placeholder: '{"cluster":{"cluster_id":"..."},"node":{"node_id":"..."},"server":{...}}' }] },
  ]},
  // GROUP 11 - Visualization
  { group: 'Visualization', items: [
    { id: 'viz_topology', method: 'GET', path: '/api/v1/cluster/topology', desc: 'Cluster topology', inputs: [] },
    { id: 'viz_metrics', method: 'GET', path: '/api/v1/cluster/metrics', desc: 'Cluster metrics', inputs: [] },
    { id: 'viz_timeline', method: 'GET', path: '/api/v1/cluster/timeline', desc: 'Event timeline', inputs: [] },
    { id: 'viz_all', method: 'GET', path: '/api/v1/cluster/viz', desc: 'All visualization data', inputs: [] },
  ]},
  // GROUP 12 - Federation
  { group: 'Federation', items: [
    { id: 'fed_create', method: 'POST', path: '/api/v1/federation/clusters', desc: 'Add federated cluster',

// ===== Utility Functions =====
function syntaxHighlight(json) {
  if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
  json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
    let cls = 'json-number';
    if (/^"/.test(match)) {
      if (/:$/.test(match)) { cls = 'json-key'; } else { cls = 'json-string'; }
    } else if (/true|false/.test(match)) { cls = 'json-bool'; } else if (/null/.test(match)) { cls = 'json-null'; }
    return '<span class="' + cls + '">' + match + '</span>';
  });
}

function buildUrl(base, path, inputs, formValues, urlParams) {
  let url = base + path;
  let queryParams = [];
  inputs.forEach(inp => {
    if (inp.urlParam && formValues[inp.name]) {
      url = url.replace('{' + inp.name + '}', encodeURIComponent(formValues[inp.name]));
    } else if (inp.queryParam && formValues[inp.name]) {
      queryParams.push(inp.name + '=' + encodeURIComponent(formValues[inp.name]));
    }
  });
  if (queryParams.length) url += '?' + queryParams.join('&');
  return url;
}

function buildBody(inputs, formValues) {
  const body = {};
  inputs.forEach(inp => {
    if (!inp.urlParam && !inp.queryParam && formValues[inp.name] !== undefined && formValues[inp.name] !== '') {
      let val = formValues[inp.name];
      if (inp.type === 'textarea') {
        try { val = JSON.parse(val); } catch(e) { val = val; }
      }
      body[inp.name] = val;
    }
  });
  return Object.keys(body).length > 0 ? body : null;
}

function MethodBadge({ method, small }) {
  return <span className={`method-badge ${method}`} style={small ? {fontSize:'9px',padding:'1px 4px'} : {}}>{method}</span>;
}

function ResponseDisplay({ response }) {
  if (!response) return null;
  const statusClass = response.status < 300 ? 's2' : response.status < 400 ? 's3' : response.status < 500 ? 's4' : 's5';
  let bodyDisplay = '';
  if (response.isText) {
    bodyDisplay = response.body;
  } else {
    bodyDisplay = syntaxHighlight(response.body);
  }
  return (
    <div className="response-panel">
      <div className="response-header">
        <span className={`status ${statusClass}`}>HTTP {response.status}</span>
        <span className="time">{response.time}ms</span>
        {response.ok === false && <span style={{color:'var(--red)'}}>Error</span>}
      </div>
      <div className="response-body">
        <pre dangerouslySetInnerHTML={{__html: bodyDisplay}} />
      </div>
    </div>
  );
}

function EndpointCard({ endpoint }) {
  const [open, setOpen] = useState(false);
  const [formValues, setFormValues] = useState({});
  const [response, setResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const apiBase = useApiBase();

  const handleChange = (name, value) => {
    setFormValues(prev => ({...prev, [name]: value}));
  };

  const execute = async () => {
    setLoading(true);
    setResponse(null);
    const start = performance.now();
    try {
      const url = buildUrl(apiBase, endpoint.path, endpoint.inputs, formValues);
      const fetchOpts = { method: endpoint.method, headers: {} };
      if (['POST', 'PUT', 'PATCH'].includes(endpoint.method)) {
        const body = buildBody(endpoint.inputs, formValues);
        if (body) {
          fetchOpts.headers['Content-Type'] = 'application/json';
          fetchOpts.body = JSON.stringify(body);
        }
      }
      const res = await fetch(url, fetchOpts);
      const elapsed = Math.round(performance.now() - start);
      let body;
      const ct = res.headers.get('content-type') || '';
      const isText = ct.includes('text/plain');
      if (isText) {
        body = await res.text();
      } else {
        try { body = await res.json(); } catch(e) { body = await res.text(); }
      }
      setResponse({ status: res.status, time: elapsed, body, isText, ok: res.ok });
    } catch(e) {
      const elapsed = Math.round(performance.now() - start);
      setResponse({ status: 0, time: elapsed, body: {error: e.message}, isText: false, ok: false });
    }
    setLoading(false);
  };

  const needsUrl = endpoint.inputs.some(i => i.urlParam);
  const hasBody = endpoint.inputs.some(i => !i.urlParam && !i.queryParam);

  return (
    <div className="endpoint-card">
      <div className="endpoint-header" onClick={() => setOpen(!open)}>
        <MethodBadge method={endpoint.method} />
        <span className="url">{endpoint.path}</span>
        <span className="desc">{endpoint.desc}</span>
        <span className={`toggle ${open ? 'open' : ''}`}>▼</span>
      </div>
      {open && (
        <div className="endpoint-body">
          {endpoint.inputs.length > 0 && (
            <div>
              {needsUrl && <div className="section-title" style={{margin:'0 0 8px',fontSize:'13px'}}>URL Parameters</div>}
              {endpoint.inputs.filter(i => i.urlParam).map(inp => (
                <div className="form-row" key={inp.name}>
                  <div className="form-group">
                    <label>{inp.label}{inp.required ? ' *' : ''}</label>
                    <input type="text" value={formValues[inp.name] || ''} placeholder={inp.placeholder || ''} onChange={e => handleChange(inp.name, e.target.value)} />
                  </div>
                </div>
              ))}
              {endpoint.inputs.some(i => i.queryParam) && <div className="section-title" style={{margin:'0 0 8px',fontSize:'13px'}}>Query Parameters</div>}
              {endpoint.inputs.filter(i => i.queryParam).map(inp => (
                <div className="form-row" key={inp.name}>
                  <div className="form-group">
                    <label>{inp.label}{inp.required ? ' *' : ''}</label>
                    <input type="text" value={formValues[inp.name] || ''} placeholder={inp.placeholder || ''} onChange={e => handleChange(inp.name, e.target.value)} />
                  </div>
                </div>
              ))}
              {hasBody && <div className="section-title" style={{margin:'0 0 8px',fontSize:'13px'}}>Request Body</div>}
              {endpoint.inputs.filter(i => !i.urlParam && !i.queryParam).map(inp => (
                <div className="form-row" key={inp.name}>
                  <div className="form-group">
                    <label>{inp.label}{inp.required ? ' *' : ''}</label>
                    {inp.type === 'textarea' ? (
                      <textarea value={formValues[inp.name] || ''} placeholder={inp.placeholder || ''} onChange={e => handleChange(inp.name, e.target.value)} />
                    ) : (
                      <input type="text" value={formValues[inp.name] || ''} placeholder={inp.placeholder || ''} onChange={e => handleChange(inp.name, e.target.value)} />
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
          {endpoint.inputs.length === 0 && (endpoint.method === 'GET' || endpoint.method === 'DELETE') && (
            <div style={{color:'var(--text-dim)',fontSize:'13px',marginBottom:8}}>No parameters required. Click Execute to make the request.</div>
          )}
          <div className="actions">
            <button className="btn primary" onClick={execute} disabled={loading}>
              {loading ? 'Executing...' : 'Execute'}
            </button>
            {loading && <span className="loading">Loading...</span>}
          </div>
          <ResponseDisplay response={response} />
        </div>
      )}
    </div>
  );
}

function Overview() {
  const apiBase = useApiBase();
  const [health, setHealth] = useState(null);
  const [summary, setSummary] = useState(null);
  const [loading, setLoading] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);

  const fetchHealth = useCallback(async () => {
    try {
      const res = await fetch(apiBase + '/health');
      if (res.ok) { const d = await res.json(); setHealth(d); }
    } catch(e) {}
  }, [apiBase]);

  const fetchSummary = useCallback(async () => {
    try {
      const res = await fetch(apiBase + '/api/v1/summary');
      if (res.ok) { const d = await res.json(); setSummary(d); }
    } catch(e) {}
  }, [apiBase]);

  const refresh = useCallback(async () => {
    setLoading(true);
    await Promise.all([fetchHealth(), fetchSummary()]);
    setLastRefresh(new Date().toLocaleTimeString());
    setLoading(false);
  }, [fetchHealth, fetchSummary]);

  useEffect(() => { refresh(); }, []);
  useEffect(() => {
    const interval = setInterval(() => { fetchHealth(); fetchSummary(); setLastRefresh(new Date().toLocaleTimeString()); }, 10000);
    return () => clearInterval(interval);
  }, [fetchHealth, fetchSummary]);

  const healthColor = health?.status === 'ok' ? 'green' : health?.status === 'degraded' ? 'orange' : 'red';
  const uptimeH = health?.uptime_seconds ? Math.floor(health.uptime_seconds / 3600) : 0;
  const uptimeM = health?.uptime_seconds ? Math.floor((health.uptime_seconds % 3600) / 60) : 0;

  return (
    <div>
      <div className="page-title">Cluster Overview</div>
      <div className="page-subtitle">Real-time status of your Hermes Agent Cluster {lastRefresh && <span>· Last updated: {lastRefresh}</span>}</div>
      <div className="overview-grid">
        <div className="stat-card">
          <div className="label">Cluster Status</div>
          <div className={`value ${healthColor}`}>{health?.status || 'Unknown'}</div>
          <div className="health-bar"><div className={`fill ${healthColor}`} style={{width: health?.status === 'ok' ? '100%' : health?.status === 'degraded' ? '60%' : '20%'}}></div></div>
        </div>
        <div className="stat-card">
          <div className="label">Nodes</div>
          <div className="value">{summary?.nodes?.total ?? '—'}</div>
          {summary?.nodes && <div style={{fontSize:12,color:'var(--text-dim)',marginTop:4}}>
            <span className="status-dot online"></span>{summary.nodes.active ?? 0} active
            {summary.nodes.offline > 0 && <span style={{marginLeft:8}}><span className="status-dot offline"></span>{summary.nodes.offline} offline</span>}
          </div>}
        </div>
        <div className="stat-card">
          <div className="label">Tasks</div>
          <div className="value">{summary?.tasks?.total ?? '—'}</div>
          {summary?.tasks && <div style={{fontSize:12,color:'var(--text-dim)',marginTop:4}}>
            {summary.tasks.pending ?? 0} pending · {summary.tasks.running ?? 0} running · {summary.tasks.completed ?? 0} done
          </div>}
        </div>
        <div className="stat-card">
          <div className="label">Leases</div>
          <div className="value">{summary?.leases?.total ?? '—'}</div>
            {summary?.leases && <div style={{fontSize:12,color:'var(--text-dim)',marginTop:4}}>
            {summary.leases?.active ?? 0} active
          </div>}
        </div>
      </div>
      <div className="overview-details">
        <div className="detail-card">
          <h3>Cluster Info</h3>
          <div className="detail-row"><span className="k">Cluster ID</span><span className="v">{health?.cluster_id || '—'}</span></div>
          <div className="detail-row"><span className="k">Node ID</span><span className="v">{health?.node_id || '—'}</span></div>
          <div className="detail-row"><span className="k">Role</span><span className="v">{health?.role || '—'}</span></div>
          <div className="detail-row"><span className="k">Version</span><span className="v">{health?.version || '—'}</span></div>
          <div className="detail-row"><span className="k">Uptime</span><span className="v">{uptimeH}h {uptimeM}m</span></div>
        </div>
        <div className="detail-card">
          <h3>Quick Actions</h3>

        </div>

  );

const ALL_CAPS = ['planning','reviewing','scheduling','coding','testing','debugging','documentation','deployment'];

function SetupWizard({ onComplete }) {
  const [step, setStep] = useState(1);
  const [role, setRole] = useState(null);
  const [config, setConfig] = useState({
    cluster_id: 'hermes-cluster', node_id: 'main-node', node_name: 'Main Node',
    capabilities: ['planning','reviewing','scheduling'], port: 8787,
    endpoint: '', token: '', auto_start: true,
  });
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [tokenCopied, setTokenCopied] = useState(false);
  const apiBase = useApiBase();

  const updateConfig = (key, val) => setConfig(prev => ({...prev, [key]: val}));

  const toggleCap = (cap) => {
    setConfig(prev => {
      const caps = prev.capabilities.includes(cap)
        ? prev.capabilities.filter(c => c !== cap)
        : [...prev.capabilities, cap];
      return {...prev, capabilities: caps};
    });
  };

  const testConnection = async () => {
    setTesting(true); setTestResult(null); setError(null);
    try {
      const res = await fetch(apiBase + '/api/v1/setup/test-connection', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ endpoint: config.endpoint }),
      });
      const data = await res.json();
      if (res.ok) { setTestResult(data); }
      else { setError(data.detail || 'Connection failed'); }
    } catch(e) { setError(e.message); }
    setTesting(false);
  };

  const submitConfig = async () => {
    setSaving(true); setError(null);
    try {
      const body = { ...config, role, node_name: config.node_name || (role === 'main' ? 'Main Node' : config.node_id) };
      const res = await fetch(apiBase + '/api/v1/setup/config', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (res.ok) { onComplete(); }
      else { setError(data.detail || 'Failed to save config'); }
    } catch(e) { setError(e.message); }
    setSaving(false);
  };

  const copyToken = () => {
    navigator.clipboard.writeText(config.token);
    setTokenCopied(true);
    setTimeout(() => setTokenCopied(false), 2000);
  };

  const canProceed = () => {
    if (step === 1) return role !== null;
    if (step === 2) {
      if (role === 'main') return config.cluster_id && config.node_id;
      return config.endpoint && config.token && config.node_id;

  return (
    <div className="wizard-overlay">
      <div className="wizard-container">
        <div className="wizard-steps">

            <div key={s} className={`wizard-step-dot ${step === s ? 'active' : step > s ? 'done' : ''}`} />

            <div className="wizard-subtitle">Review your configuration before starting</div>
            <div className="wizard-summary">
              <div className="summary-row"><span className="summary-key">Role</span><span className="summary-val">{role}</span></div>
              {role === 'main' && <div className="summary-row"><span className="summary-key">Cluster ID</span><span className="summary-val">{config.cluster_id}</span></div>}
              <div className="summary-row"><span className="summary-key">Node ID</span><span className="summary-val">{config.node_id}</span></div>
              <div className="summary-row"><span className="summary-key">Node Name</span><span className="summary-val">{config.node_name || config.node_id}</span></div>
              <div className="summary-row"><span className="summary-key">Capabilities</span><span className="summary-val">{config.capabilities.join(', ')}</span></div>
              {role === 'main' && <div className="summary-row"><span className="summary-key">Port</span><span className="summary-val">{config.port}</span></div>}
              {role === 'worker' && <div className="summary-row"><span className="summary-key">Endpoint</span><span className="summary-val">{config.endpoint}</span></div>}
              <div className="summary-row">
                <span className="summary-key">Token</span>
                <span className="summary-val">
                  <span className="wizard-token-row">
                    <span className="token-value">{role === 'main' ? config.token || '(will be generated)' : config.token}</span>
                    {role === 'main' && <button className="copy-btn" onClick={copyToken}>{tokenCopied ? '✓ Copied' : 'Copy'}</button>}
                  </span>
                </span>
              </div>
            </div>
            {error && <div style={{color:'var(--red)',fontSize:13,marginTop:12}}>✗ {error}</div>}
            <div className="wizard-actions">
              <button className="btn" onClick={() => setStep(2)}>← Back</button>
              <button className="btn primary" onClick={submitConfig} disabled={saving}>
                {saving ? '⏳ Saving...' : '🚀 Start Cluster'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [setupComplete, setSetupComplete] = useState(null);
  const [setupLoading, setSetupLoading] = useState(true);
  const [apiBase, setApiBase] = useState('');
  const [apiBaseInput, setApiBaseInput] = useState('');
  const [activeTab, setActiveTab] = useState('overview');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [openGroups, setOpenGroups] = useState({'Health & Info': true, 'Nodes': false, 'Tasks': true, 'Leases': false, 'Sync': false, 'Recovery': false, 'Schedule': false, 'Workflow': false, 'Status & Summary': true, 'Config': false, 'Visualization': false, 'Federation': false, 'Webhooks': false});
  const [connectionStatus, setConnectionStatus] = useState(null);
  const [testing, setTesting] = useState(false);

  const toggleGroup = (group) => {
    setOpenGroups(prev => ({...prev, [group]: !prev[group]}));
  };

  const navigate = (tab) => {
    setActiveTab(tab);
    setSidebarOpen(false);
  };

  const testConnection = async () => {
    setTesting(true);
    setConnectionStatus(null);
    try {
      const start = performance.now();
      const res = await fetch(apiBase + '/health');
      const elapsed = Math.round(performance.now() - start);
      if (res.ok) {
        const data = await res.json();
        setConnectionStatus({ ok: true, time: elapsed, data });
      } else {
        setConnectionStatus({ ok: false, time: elapsed, error: `HTTP ${res.status}` });
      }
    } catch(e) {
      setConnectionStatus({ ok: false, error: e.message });
    }
    setTesting(false);
  };

  const applyApiBase = () => {
    let url = apiBaseInput.trim();
    if (url.endsWith('/')) url = url.slice(0, -1);
    setApiBase(url);
  };

  // Check setup status on mount
  React.useEffect(() => {
    (async () => {
      try {
        const res = await fetch(apiBase + '/api/v1/setup/status');
        if (res.ok) {
          const data = await res.json();
          setSetupComplete(data.setup_complete);
        } else {
          setSetupComplete(true); // if endpoint doesn't exist, show dashboard
        }
      } catch(e) {
        setSetupComplete(true); // on error, show dashboard
      }
      setSetupLoading(false);
    })();
  }, [apiBase]);

  // Show loading spinner while checking setup
  if (setupLoading) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text-dim)'}}>
        <span>Loading...</span>
      </div>
    );
  }

  // Show setup wizard if setup not complete
  if (setupComplete === false) {
    return (
      <ApiBaseContext.Provider value={apiBase}>
        <SetupWizard onComplete={() => setSetupComplete(true)} />
      </ApiBaseContext.Provider>
    );
  }

  return (
    <ApiBaseContext.Provider value={apiBase}>
      <div className="layout">
        <Sidebar activeTab={activeTab} onNavigate={navigate} openGroups={openGroups} toggleGroup={toggleGroup} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} />
        <div className="main">
          <div className="topbar">
            <button className="hamburger" onClick={() => setSidebarOpen(!sidebarOpen)}>☰</button>
            <div className="topbar-input-group">
              <label>API Base:</label>
              <input type="text" value={apiBaseInput} onChange={e => setApiBaseInput(e.target.value)} placeholder="http://localhost:8000 (leave empty for same origin)" onKeyDown={e => e.key === 'Enter' && applyApiBase()} />
              <button className="btn small" onClick={applyApiBase}>Apply</button>
            </div>
            <button className="btn small" onClick={testConnection} disabled={testing}>
              {testing ? '⏳ Testing...' : '🔌 Test Connection'}
            </button>
          </div>
          {connectionStatus && (
            <div style={{padding:'8px 20px',background: connectionStatus.ok ? 'rgba(63,185,80,0.1)' : 'rgba(248,81,73,0.1)', borderBottom:'1px solid var(--border)',fontSize:13}}>
              {connectionStatus.ok ? (
                <span style={{color:'var(--green)'}}>✓ Connected in {connectionStatus.time}ms — {connectionStatus.data?.cluster_id || 'OK'}</span>
              ) : (
                <span style={{color:'var(--red)'}}>✗ Connection failed: {connectionStatus.error}</span>
              )}
            </div>
          )}
          <div className="content">
            <div className="content-area">
              {activeTab === 'overview' ? <Overview /> : <EndpointPage endpointId={activeTab} />}
            </div>
          </div>
        </div>
      </div>
    </ApiBaseContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

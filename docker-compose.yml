version: "3.8"

services:
  main:
    build: .
    container_name: hkr-main
    ports:
      - "8787:8787"
    volumes:
      - ./configs/main.yaml:/app/cluster.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/api/v1/nodes"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - hkr-net

  worker:
    build: .
    container_name: hkr-worker
    depends_on:
      main:
        condition: service_healthy
    ports:
      - "8788:8787"
    volumes:
      - ./configs/worker.yaml:/app/cluster.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/api/v1/nodes"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - hkr-net

networks:
  hkr-net:
    driver: bridge

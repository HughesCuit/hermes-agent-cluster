<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent Cluster — Configuration</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --orange: #db6d28;
  --purple: #bc8cff;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header h1 {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.header h1 .logo {
  color: var(--accent);
  font-size: 22px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 6px;
  transition: background 0.2s;
}

.nav-link:hover {
  background: rgba(88, 166, 255, 0.1);
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* Layout: config form left, YAML preview right */
.config-layout {
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 24px;
  align-items: start;
}

@media (max-width: 1100px) {
  .config-layout { grid-template-columns: 1fr; }
}

/* Collapsible config section cards */
.config-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}

.config-section-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.config-section-header:hover {
  background: rgba(88, 166, 255, 0.04);
}

.config-section-title {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.config-section-title .section-icon {
  font-size: 16px;
  opacity: 0.7;
}

.config-section-toggle {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.config-section.collapsed .config-section-toggle {
  transform: rotate(-90deg);
}

.config-section-body {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.config-section.collapsed .config-section-body {
  display: none;
}

/* Form fields */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group.full-width {
  grid-column: 1 / -1;
}

.form-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.form-label .field-hint {
  font-weight: 400;
  text-transform: none;
  color: var(--text-muted);
  font-size: 11px;
  margin-left: 4px;
}

.form-input,
.form-select {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text-primary);
  font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus,
.form-select:focus {
  border-color: var(--accent);
}

.form-input.error {
  border-color: var(--red);
}

.form-checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
}

.form-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
}

.form-checkbox-label {
  font-size: 13px;
  color: var(--text-primary);
}

.field-error {
  font-size: 11px;
  color: var(--red);
  min-height: 16px;
}

/* YAML preview panel */
.yaml-panel {
  position: sticky;
  top: 24px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.yaml-panel-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.yaml-panel-title {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.yaml-panel-body {
  padding: 16px 20px;
  max-height: calc(100vh - 200px);
  overflow-y: auto;
}

.yaml-preview {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text-secondary);
  max-height: calc(100vh - 280px);
  overflow-y: auto;
}

.yaml-key { color: var(--accent); }
.yaml-value { color: var(--green); }
.yaml-comment { color: var(--text-muted); font-style: italic; }

/* Action bar */
.action-bar {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.action-bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.action-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn {
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: var(--bg-primary);
  border-color: var(--accent);
}

.btn-primary:hover {
  background: #4090e0;
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary {
  background: transparent;
  color: var(--text-secondary);
  border-color: var(--border);
}

.btn-secondary:hover {
  color: var(--text-primary);
  border-color: var(--text-secondary);
}

.btn-danger {
  background: transparent;
  color: var(--red);
  border-color: rgba(248, 81, 73, 0.3);
}

.btn-danger:hover {
  background: rgba(248, 81, 73, 0.1);
}

.btn-sm {
  padding: 4px 12px;
  font-size: 12px;
}

/* Toast notification */
.toast {
  position: fixed;
  top: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  z-index: 1000;
  transform: translateX(120%);
  transition: transform 0.3s ease;
  max-width: 400px;
}

.toast.show {
  transform: translateX(0);
}

.toast.success {
  background: rgba(63, 185, 80, 0.15);
  border: 1px solid rgba(63, 185, 80, 0.3);
  color: var(--green);
}

.toast.error {
  background: rgba(248, 81, 73, 0.15);
  border: 1px solid rgba(248, 81, 73, 0.3);
  color: var(--red);
}

/* Validation errors banner */
.validation-errors {
  background: rgba(248, 81, 73, 0.1);
  border: 1px solid rgba(248, 81, 73, 0.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 16px;
  display: none;
}

.validation-errors.visible {
  display: block;
}

.validation-errors-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--red);
  margin-bottom: 8px;
}

.validation-errors-list {
  list-style: none;
  padding: 0;
}

.validation-errors-list li {
  font-size: 12px;
  color: var(--red);
  padding: 2px 0;
}

.validation-errors-list li::before {
  content: "\2022 ";
  margin-right: 4px;
}

/* Status indicator */
.save-status {
  font-size: 12px;
  color: var(--text-muted);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }
</style>
</head>
<body>

<div class="header">
  <h1><span class="logo">&#9651;</span> Hermes Agent Cluster</h1>
  <div class="header-right">
    <a href="/dashboard/" class="nav-link">Dashboard</a>
    <a href="/dashboard/config.html" class="nav-link" style="background:rgba(88,166,255,0.1)">Config</a>
    <a href="/dashboard/guide.html" class="nav-link">Guide</a>
    <a href="/health" class="nav-link">Health</a>
    <a href="/metrics" class="nav-link">Metrics</a>
  </div>
</div>

<div class="container">
  <!-- Action Bar -->
  <div class="action-bar">
    <div class="action-bar-left">
      <span style="font-size:16px;font-weight:600">Cluster Configuration</span>
      <span class="save-status" id="save-status"></span>
    </div>
    <div class="action-bar-right">
      <button class="btn btn-danger btn-sm" onclick="resetToDefaults()">Reset to Defaults</button>
      <button class="btn btn-primary" id="btn-save" onclick="saveConfig()">Save Configuration</button>
    </div>
  </div>

  <!-- Validation Errors -->
  <div class="validation-errors" id="validation-errors">
    <div class="validation-errors-title">Validation Errors</div>
    <ul class="validation-errors-list" id="validation-errors-list"></ul>
  </div>

  <div class="config-layout">
    <!-- Left: Config Form -->
    <div class="config-form" id="config-form">

      <!-- Cluster -->
      <div class="config-section" id="section-cluster">
        <div class="config-section-header" onclick="toggleSection('cluster')">
          <span class="config-section-title"><span class="section-icon">&#127760;</span> Cluster</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <label class="form-label">Cluster ID</label>
            <input class="form-input" data-field="cluster.id" data-type="string" placeholder="cluster_default">
            <span class="field-error" data-error="cluster.id"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Role <span class="field-hint">main or worker</span></label>
            <select class="form-select" data-field="cluster.role" data-type="string">
              <option value="main">main</option>
              <option value="worker">worker</option>
            </select>
            <span class="field-error" data-error="cluster.role"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Endpoint <span class="field-hint">worker only</span></label>
            <input class="form-input" data-field="cluster.endpoint" data-type="string" placeholder="http://main:8787">
            <span class="field-error" data-error="cluster.endpoint"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Token <span class="field-hint">cluster auth</span></label>
            <input class="form-input" data-field="cluster.token" data-type="string" type="password" placeholder="(optional)">
            <span class="field-error" data-error="cluster.token"></span>
          </div>
        </div>
      </div>

      <!-- Node -->
      <div class="config-section" id="section-node">
        <div class="config-section-header" onclick="toggleSection('node')">
          <span class="config-section-title"><span class="section-icon">&#128187;</span> Node</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <label class="form-label">Node ID</label>
            <input class="form-input" data-field="node.id" data-type="string" placeholder="node_main">
            <span class="field-error" data-error="node.id"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Node Name</label>
            <input class="form-input" data-field="node.name" data-type="string" placeholder="main-node">
            <span class="field-error" data-error="node.name"></span>
          </div>
          <div class="form-group full-width">
            <label class="form-label">Capabilities <span class="field-hint">comma-separated</span></label>
            <input class="form-input" data-field="node.capabilities" data-type="csv" placeholder="python, data-processing">
            <span class="field-error" data-error="node.capabilities"></span>
          </div>
        </div>
      </div>

      <!-- Server -->
      <div class="config-section" id="section-server">
        <div class="config-section-header" onclick="toggleSection('server')">
          <span class="config-section-title"><span class="section-icon">&#128421;</span> Server</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <label class="form-label">Bind Address</label>
            <input class="form-input" data-field="server.bind" data-type="string" placeholder="0.0.0.0">
            <span class="field-error" data-error="server.bind"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Port</label>
            <input class="form-input" data-field="server.port" data-type="int" placeholder="8787">
            <span class="field-error" data-error="server.port"></span>
          </div>
        </div>
      </div>

      <!-- Lease -->
      <div class="config-section" id="section-lease">
        <div class="config-section-header" onclick="toggleSection('lease')">
          <span class="config-section-title"><span class="section-icon">&#128275;</span> Lease</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <label class="form-label">TTL <span class="field-hint">e.g. 60s, 1m30s</span></label>
            <input class="form-input" data-field="lease.ttl" data-type="duration" placeholder="60s">
            <span class="field-error" data-error="lease.ttl"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Scan Rate <span class="field-hint">e.g. 10s</span></label>
            <input class="form-input" data-field="lease.scan_rate" data-type="duration" placeholder="10s">
            <span class="field-error" data-error="lease.scan_rate"></span>
          </div>
        </div>
      </div>

      <!-- Watchdog -->
      <div class="config-section" id="section-watchdog">
        <div class="config-section-header" onclick="toggleSection('watchdog')">
          <span class="config-section-title"><span class="section-icon">&#128065;</span> Watchdog</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <label class="form-label">Check Interval <span class="field-hint">e.g. 5s</span></label>
            <input class="form-input" data-field="watchdog.check_interval" data-type="duration" placeholder="5s">
            <span class="field-error" data-error="watchdog.check_interval"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Degraded After <span class="field-hint">e.g. 15s</span></label>
            <input class="form-input" data-field="watchdog.degraded_after" data-type="duration" placeholder="15s">
            <span class="field-error" data-error="watchdog.degraded_after"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Offline After <span class="field-hint">e.g. 30s</span></label>
            <input class="form-input" data-field="watchdog.offline_after" data-type="duration" placeholder="30s">
            <span class="field-error" data-error="watchdog.offline_after"></span>
          </div>
        </div>
      </div>

      <!-- TLS -->
      <div class="config-section" id="section-tls">
        <div class="config-section-header" onclick="toggleSection('tls')">
          <span class="config-section-title"><span class="section-icon">&#128274;</span> TLS</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <div class="form-checkbox-wrap">
              <input class="form-checkbox" type="checkbox" data-field="tls.enabled" data-type="bool" id="tls-enabled">
              <label class="form-checkbox-label" for="tls-enabled">Enable TLS</label>
            </div>
            <span class="field-error" data-error="tls.enabled"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Certificate File</label>
            <input class="form-input" data-field="tls.cert_file" data-type="string" placeholder="/path/to/cert.pem">
            <span class="field-error" data-error="tls.cert_file"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Key File</label>
            <input class="form-input" data-field="tls.key_file" data-type="string" placeholder="/path/to/key.pem">
            <span class="field-error" data-error="tls.key_file"></span>
          </div>
        </div>
      </div>

      <!-- Heartbeat -->
      <div class="config-section" id="section-heartbeat">
        <div class="config-section-header" onclick="toggleSection('heartbeat')">
          <span class="config-section-title"><span class="section-icon">&#10084;</span> Heartbeat</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <label class="form-label">Interval <span class="field-hint">e.g. 30s</span></label>
            <input class="form-input" data-field="heartbeat.interval" data-type="duration" placeholder="30s">
            <span class="field-error" data-error="heartbeat.interval"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Lease Timeout <span class="field-hint">e.g. 120s</span></label>
            <input class="form-input" data-field="heartbeat.lease_timeout" data-type="duration" placeholder="120s">
            <span class="field-error" data-error="heartbeat.lease_timeout"></span>
          </div>
        </div>
      </div>

      <!-- Reconnect -->
      <div class="config-section" id="section-reconnect">
        <div class="config-section-header" onclick="toggleSection('reconnect')">
          <span class="config-section-title"><span class="section-icon">&#128260;</span> Reconnect</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <label class="form-label">Initial Interval <span class="field-hint">e.g. 1s</span></label>
            <input class="form-input" data-field="reconnect.initial_interval" data-type="duration" placeholder="1s">
            <span class="field-error" data-error="reconnect.initial_interval"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Max Interval <span class="field-hint">e.g. 60s</span></label>
            <input class="form-input" data-field="reconnect.max_interval" data-type="duration" placeholder="60s">
            <span class="field-error" data-error="reconnect.max_interval"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Multiplier</label>
            <input class="form-input" data-field="reconnect.multiplier" data-type="float" placeholder="2.0">
            <span class="field-error" data-error="reconnect.multiplier"></span>
          </div>
        </div>
      </div>

      <!-- Federation -->
      <div class="config-section" id="section-federation">
        <div class="config-section-header" onclick="toggleSection('federation')">
          <span class="config-section-title"><span class="section-icon">&#127758;</span> Federation</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <div class="form-checkbox-wrap">
              <input class="form-checkbox" type="checkbox" data-field="federation.enabled" data-type="bool" id="federation-enabled">
              <label class="form-checkbox-label" for="federation-enabled">Enable Federation</label>
            </div>
            <span class="field-error" data-error="federation.enabled"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Ping Interval <span class="field-hint">e.g. 30s</span></label>
            <input class="form-input" data-field="federation.ping_interval" data-type="duration" placeholder="30s">
            <span class="field-error" data-error="federation.ping_interval"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Token <span class="field-hint">shared secret</span></label>
            <input class="form-input" data-field="federation.token" data-type="string" type="password" placeholder="(optional)">
            <span class="field-error" data-error="federation.token"></span>
          </div>
        </div>
      </div>

      <!-- Telemetry -->
      <div class="config-section" id="section-telemetry">
        <div class="config-section-header" onclick="toggleSection('telemetry')">
          <span class="config-section-title"><span class="section-icon">&#128200;</span> Telemetry</span>
          <span class="config-section-toggle">&#9660;</span>
        </div>
        <div class="config-section-body">
          <div class="form-group">
            <div class="form-checkbox-wrap">
              <input class="form-checkbox" type="checkbox" data-field="telemetry.enabled" data-type="bool" id="telemetry-enabled">
              <label class="form-checkbox-label" for="telemetry-enabled">Enable Telemetry</label>
            </div>
            <span class="field-error" data-error="telemetry.enabled"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Exporter <span class="field-hint">otlp, stdout, none</span></label>
            <select class="form-select" data-field="telemetry.exporter" data-type="string">
              <option value="none">none</option>
              <option value="otlp">otlp</option>
              <option value="stdout">stdout</option>
            </select>
            <span class="field-error" data-error="telemetry.exporter"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Endpoint</label>
            <input class="form-input" data-field="telemetry.endpoint" data-type="string" placeholder="localhost:4317">
            <span class="field-error" data-error="telemetry.endpoint"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Service Name</label>
            <input class="form-input" data-field="telemetry.service_name" data-type="string" placeholder="hermes-agent-cluster">
            <span class="field-error" data-error="telemetry.service_name"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Sample Rate <span class="field-hint">0.0 - 1.0</span></label>
            <input class="form-input" data-field="telemetry.sample_rate" data-type="float" placeholder="1.0">
            <span class="field-error" data-error="telemetry.sample_rate"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Batch Timeout <span class="field-hint">e.g. 5s</span></label>
            <input class="form-input" data-field="telemetry.batch_timeout" data-type="duration" placeholder="5s">
            <span class="field-error" data-error="telemetry.batch_timeout"></span>
          </div>
        </div>
      </div>

    </div>

    <!-- Right: YAML Preview -->
    <div class="yaml-panel">
      <div class="yaml-panel-header">
        <span class="yaml-panel-title">YAML Preview</span>
        <button class="btn btn-secondary btn-sm" onclick="copyYAML()">Copy</button>
      </div>
      <div class="yaml-panel-body">
        <pre class="yaml-preview" id="yaml-preview"></pre>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '/api/v1';
let currentConfig = null;
let defaultConfig = null;

// --- Field path helpers ---
function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
}

function setNestedValue(obj, path, value) {
  const keys = path.split('.');
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    if (!cur[keys[i]] || typeof cur[keys[i]] !== 'object') cur[keys[i]] = {};
    cur = cur[keys[i]];
  }
  cur[keys[keys.length - 1]] = value;
}

// --- Duration format ---
function durationToStr(ns) {
  if (ns === 0 || ns == null) return '0s';
  const totalSec = Math.floor(ns / 1000000000);
  if (totalSec === 0) return '0s';
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  let out = '';
  if (h > 0) out += h + 'h';
  if (m > 0) out += m + 'm';
  if (s > 0) out += s + 's';
  return out || '0s';
}

function parseDuration(str) {
  if (!str || str === '0' || str === '0s') return 0;
  let total = 0;
  const regex = /(\d+(?:\.\d+)?)\s*(h|m|s|ms|us|ns)/g;
  let match;
  while ((match = regex.exec(str)) !== null) {
    const val = parseFloat(match[1]);
    switch (match[2]) {
      case 'h':  total += val * 3600000000000; break;
      case 'm':  total += val * 60000000000; break;
      case 's':  total += val * 1000000000; break;
      case 'ms': total += val * 1000000; break;
      case 'us': total += val * 1000; break;
      case 'ns': total += val; break;
    }
  }
  return Math.round(total);
}

// --- Populate form from config ---
function populateForm(cfg) {
  document.querySelectorAll('[data-field]').forEach(el => {
    const path = el.getAttribute('data-field');
    const type = el.getAttribute('data-type');
    const val = getNestedValue(cfg, path);

    if (type === 'bool') {
      el.checked = !!val;
    } else if (type === 'duration') {
      el.value = durationToStr(val);
    } else if (type === 'csv') {
      el.value = Array.isArray(val) ? val.join(', ') : '';
    } else if (type === 'int') {
      el.value = val != null ? val : '';
    } else if (type === 'float') {
      el.value = val != null ? val : '';
    } else {
      el.value = val != null ? val : '';
    }
  });
}

// --- Read form into config object ---
function readForm() {
  const cfg = JSON.parse(JSON.stringify(currentConfig || {}));
  document.querySelectorAll('[data-field]').forEach(el => {
    const path = el.getAttribute('data-field');
    const type = el.getAttribute('data-type');
    let val;

    if (type === 'bool') {
      val = el.checked;
    } else if (type === 'duration') {
      val = parseDuration(el.value);
    } else if (type === 'csv') {
      val = el.value.split(',').map(s => s.trim()).filter(Boolean);
    } else if (type === 'int') {
      val = el.value === '' ? 0 : parseInt(el.value, 10);
    } else if (type === 'float') {
      val = el.value === '' ? 0 : parseFloat(el.value);
    } else {
      val = el.value;
    }
    setNestedValue(cfg, path, val);
  });
  return cfg;
}

// --- YAML preview ---
function generateYAML(cfg, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  let out = '';

  for (const key of Object.keys(cfg)) {
    const val = cfg[key];
    if (val === null || val === undefined) continue;

    if (Array.isArray(val)) {
      out += pad + key + ':\n';
      if (val.length === 0) {
        out += pad + '  []\n';
      } else {
        for (const item of val) {
          out += pad + '  - ' + JSON.stringify(item) + '\n';
        }
      }
    } else if (typeof val === 'object') {
      out += pad + key + ':\n';
      out += generateYAML(val, indent + 1);
    } else if (typeof val === 'string') {
      out += pad + key + ': ' + (val.includes(':') || val.includes('#') ? JSON.stringify(val) : val) + '\n';
    } else if (typeof val === 'boolean') {
      out += pad + key + ': ' + val + '\n';
    } else {
      out += pad + key + ': ' + val + '\n';
    }
  }
  return out;
}

function syntaxHighlightYAML(yaml) {
  return yaml
    .replace(/^(\s*)([\w_.-]+)(:)/gm, '$1<span class="yaml-key">$2</span>$3')
    .replace(/: (.+)$/gm, function(m, p1) {
      return ': <span class="yaml-value">' + p1 + '</span>';
    });
}

function updateYAMLPreview() {
  const cfg = readForm();
  const yaml = generateYAML(cfg);
  document.getElementById('yaml-preview').innerHTML = syntaxHighlightYAML(yaml);
}

// --- Section toggle ---
function toggleSection(name) {
  const section = document.getElementById('section-' + name);
  section.classList.toggle('collapsed');
}

// --- Toast ---
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => { toast.className = 'toast'; }, 4000);
}

// --- Validation errors ---
function showValidationErrors(errors) {
  const container = document.getElementById('validation-errors');
  const list = document.getElementById('validation-errors-list');
  if (!errors || errors.length === 0) {
    container.classList.remove('visible');
    return;
  }
  list.innerHTML = errors.map(e =>
    '<li><strong>' + esc(e.field) + ':</strong> ' + esc(e.message) +
    (e.suggestion ? ' <em>(' + esc(e.suggestion) + ')</em>' : '') + '</li>'
  ).join('');
  container.classList.add('visible');
}

function clearFieldErrors() {
  document.querySelectorAll('.field-error').forEach(el => { el.textContent = ''; });
  document.querySelectorAll('.form-input.error').forEach(el => { el.classList.remove('error'); });
}

function showFieldErrors(errors) {
  clearFieldErrors();
  if (!errors) return;
  errors.forEach(e => {
    const errEl = document.querySelector('[data-error="' + e.field + '"]');
    if (errEl) errEl.textContent = e.message;
    const input = document.querySelector('[data-field="' + e.field + '"]');
    if (input) input.classList.add('error');
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// --- Fetch config ---
async function fetchConfig() {
  try {
    const res = await fetch(API + '/config');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    showToast('Failed to load config: ' + e.message, 'error');
    return null;
  }
}

// --- Save config ---
async function saveConfig() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  document.getElementById('save-status').textContent = 'Saving...';
  clearFieldErrors();
  document.getElementById('validation-errors').classList.remove('visible');

  const cfg = readForm();

  try {
    const res = await fetch(API + '/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cfg),
    });

    const data = await res.json();

    if (!res.ok) {
      if (data.errors) {
        showFieldErrors(data.errors);
        showValidationErrors(data.errors);
      }
      showToast(data.error || 'Save failed', 'error');
      document.getElementById('save-status').textContent = '';
      btn.disabled = false;
      return;
    }

    currentConfig = data.config || cfg;
    populateForm(currentConfig);
    updateYAMLPreview();
    showToast('Configuration saved successfully', 'success');
    document.getElementById('save-status').textContent = 'Saved at ' + new Date().toLocaleTimeString();
  } catch (e) {
    showToast('Failed to save: ' + e.message, 'error');
    document.getElementById('save-status').textContent = '';
  }
  btn.disabled = false;
}

// --- Reset to defaults ---
async function resetToDefaults() {
  if (!confirm('Reset all configuration to defaults? This will overwrite your current settings.')) return;

  if (!defaultConfig) {
    try {
      const res = await fetch(API + '/config?defaults=true');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      defaultConfig = await res.json();
    } catch (e) {
      showToast('Failed to fetch defaults: ' + e.message, 'error');
      return;
    }
  }

  currentConfig = JSON.parse(JSON.stringify(defaultConfig));
  populateForm(currentConfig);
  updateYAMLPreview();
  clearFieldErrors();
  document.getElementById('validation-errors').classList.remove('visible');
  showToast('Configuration reset to defaults (not yet saved)', 'success');
  document.getElementById('save-status').textContent = 'Modified (unsaved)';
}

// --- Copy YAML ---
function copyYAML() {
  const cfg = readForm();
  const yaml = generateYAML(cfg);
  navigator.clipboard.writeText(yaml).then(() => {
    showToast('YAML copied to clipboard', 'success');
  }).catch(() => {
    showToast('Failed to copy', 'error');
  });
}

// --- Init ---
async function init() {
  currentConfig = await fetchConfig();
  if (currentConfig) {
    populateForm(currentConfig);
    updateYAMLPreview();
  }

  // Live update YAML preview on any input change
  document.getElementById('config-form').addEventListener('input', updateYAMLPreview);
  document.getElementById('config-form').addEventListener('change', updateYAMLPreview);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

services:
  hermes-main:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: hkr-hermes-main
    ports:
      - "8787:8787"
    environment:
      - XIAOMI_API_KEY=${XIAOMI_API_KEY}
      - XIAOMI_BASE_URL=${XIAOMI_BASE_URL:-https://token-plan-sgp.xiaomimimo.com/v1}
      - HERMES_HOME=/root/.hermes
    volumes:
      - hermes-main-data:/root/.hermes
    stdin_open: true
    tty: true
    networks:
      - hkr-net

  hermes-worker:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: hkr-hermes-worker
    depends_on:
      - hermes-main
    ports:
      - "8788:8787"
    environment:
      - XIAOMI_API_KEY=${XIAOMI_API_KEY}
      - XIAOMI_BASE_URL=${XIAOMI_BASE_URL:-https://token-plan-sgp.xiaomimimo.com/v1}
      - HERMES_HOME=/root/.hermes
    volumes:
      - hermes-worker-data:/root/.hermes
    stdin_open: true
    tty: true
    networks:
      - hkr-net

volumes:
  hermes-main-data:
  hermes-worker-data:

networks:
  hkr-net:
    driver: bridge
